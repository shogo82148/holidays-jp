name: Update
on:
  repository_dispatch:
    types: [update]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  update:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "updater/go.mod"
          cache-dependency-path: "updater/go.sum"

      - name: Update syukujitsu.csv
        run: go run main.go
        working-directory: updater

      - name: Generate token
        id: token
        uses: shogo82148/actions-github-app-token@84232dc4d9bd875d4dd83e3e5c4705db1c98a997 # v1.3.1
        with:
          permission-contents: write
          permission-pull-requests: write

      - name: commit
        uses: shogo82148/actions-commit-and-create-pr@b1322fe9da4037e9720e34ea221997cffcd3498d # v1.1.4
        with:
          github-token: ${{ steps.token.outputs.token }}
          commit-message: "update syukujitsu.csv"
