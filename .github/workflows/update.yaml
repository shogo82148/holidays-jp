name: Update
on:
  repository_dispatch:
    types: [update]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  update:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "updater/go.mod"
          cache-dependency-path: "updater/go.sum"

      - name: Update syukujitsu.csv
        run: go run main.go
        working-directory: updater

      - name: Generate token
        id: token
        uses: shogo82148/actions-github-app-token@d75b03a80d0450d087a12b72dff2d987a4ced993 # v1.3.0
        with:
          permission-contents: write
          permission-pull-requests: write

      - name: commit
        uses: shogo82148/actions-commit-and-create-pr@b1322fe9da4037e9720e34ea221997cffcd3498d # v1.1.4
        with:
          github-token: ${{ steps.token.outputs.token }}
          commit-message: "update syukujitsu.csv"
